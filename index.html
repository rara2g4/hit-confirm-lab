<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0c1016" />
    <title>HitConfirm Lab</title>
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div>
          <p class="eyebrow">FGC decision trainer</p>
          <h1>HitConfirm Lab</h1>
        </div>
        <div class="mode-tabs" role="tablist" aria-label="Training mode">
          <button class="mode-tab is-active" type="button" data-mode="basic">Basic</button>
          <button class="mode-tab" type="button" data-mode="random">Random</button>
          <button class="mode-tab" type="button" data-mode="speed">Speed</button>
        </div>
      </header>

      <main class="layout">
        <section class="arena-shell" aria-label="Training arena">
          <div class="target-strip">
            <div class="color-role">
              <span class="role-label">押す</span>
              <span id="target-chip" class="color-chip"></span>
            </div>
            <div class="color-role">
              <span class="role-label">押さない</span>
              <div id="decoy-chips" class="chip-list"></div>
            </div>
          </div>

          <button id="arena" class="arena" type="button" aria-label="Input panel">
            <span id="state-label" class="state-label">READY</span>
            <span id="result-label" class="result-label">モードを選んで開始</span>
            <span id="reaction-label" class="reaction-label"></span>
          </button>

          <div class="controls">
            <button id="start-button" class="primary-button" type="button">スタート</button>
            <button id="next-button" class="secondary-button" type="button" disabled>次へ</button>
            <button id="reset-button" class="ghost-button" type="button">リセット</button>
          </div>
        </section>

        <aside class="stats-panel" aria-label="Statistics">
          <div class="stat-grid">
            <div class="stat">
              <span>ベスト</span>
              <strong id="best-time">--</strong>
            </div>
            <div class="stat">
              <span>平均</span>
              <strong id="average-time">--</strong>
            </div>
            <div class="stat">
              <span>成功率</span>
              <strong id="success-rate">0%</strong>
            </div>
            <div class="stat">
              <span>成功</span>
              <strong id="success-count">0</strong>
            </div>
            <div class="stat">
              <span>ミス</span>
              <strong id="wrong-count">0</strong>
            </div>
            <div class="stat">
              <span>フライング</span>
              <strong id="false-start-count">0</strong>
            </div>
            <div class="stat">
              <span>見逃し</span>
              <strong id="missed-count">0</strong>
            </div>
            <div class="stat">
              <span>我慢</span>
              <strong id="no-press-count">0</strong>
            </div>
          </div>

          <div class="history-block">
            <h2>直近10回</h2>
            <ol id="history-list" class="history-list"></ol>
          </div>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
